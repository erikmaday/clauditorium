name: NPM Deployments Backfill

on:
  workflow_dispatch:
    inputs:
      package_name:
        description: npm package name
        required: false
        default: clauditorium
      environment:
        description: GitHub deployment environment name
        required: false
        default: npm
      ref:
        description: Git ref or SHA to associate deployments with
        required: false
        default: main

permissions:
  contents: read
  deployments: write

jobs:
  backfill:
    runs-on: ubuntu-latest
    steps:
      - name: Backfill deployment records from npm versions
        uses: actions/github-script@v7
        env:
          PACKAGE_NAME: ${{ github.event.inputs.package_name || 'clauditorium' }}
          DEPLOY_ENV: ${{ github.event.inputs.environment || 'npm' }}
          DEPLOY_REF: ${{ github.event.inputs.ref || 'main' }}
        with:
          script: |
            const packageName = process.env.PACKAGE_NAME
            const environment = process.env.DEPLOY_ENV
            const ref = process.env.DEPLOY_REF

            const owner = context.repo.owner
            const repo = context.repo.repo

            const npmResponse = await fetch(`https://registry.npmjs.org/${packageName}`)
            if (!npmResponse.ok) {
              core.setFailed(`Failed to fetch npm metadata for ${packageName}: ${npmResponse.status}`)
              return
            }

            const npmData = await npmResponse.json()
            const versions = Object.keys(npmData.versions || {}).sort((a, b) =>
              a.localeCompare(b, undefined, { numeric: true, sensitivity: 'base' })
            )

            if (versions.length === 0) {
              core.warning(`No versions found on npm for ${packageName}`)
              return
            }

            const existingDeployments = await github.paginate(
              github.rest.repos.listDeployments,
              {
                owner,
                repo,
                environment,
                per_page: 100
              }
            )

            const existingVersions = new Set()
            for (const deployment of existingDeployments) {
              let payload = deployment.payload
              if (typeof payload === 'string' && payload.length > 0) {
                try {
                  payload = JSON.parse(payload)
                } catch {
                  payload = null
                }
              }

              const version = payload && typeof payload === 'object' ? payload.version : null
              if (typeof version === 'string' && version.length > 0) {
                existingVersions.add(version)
              }
            }

            let created = 0
            let skipped = 0
            for (const version of versions) {
              if (existingVersions.has(version)) {
                core.info(`Skipping existing deployment for ${version}`)
                skipped += 1
                continue
              }

              const deployment = await github.rest.repos.createDeployment({
                owner,
                repo,
                ref,
                environment,
                description: `npm publish ${packageName}@${version}`,
                task: `publish:${version}`,
                auto_merge: false,
                required_contexts: [],
                transient_environment: false,
                production_environment: true,
                payload: {
                  package: packageName,
                  version
                }
              })

              const targetUrl = `https://www.npmjs.com/package/${packageName}/v/${version}`
              await github.rest.repos.createDeploymentStatus({
                owner,
                repo,
                deployment_id: deployment.data.id,
                state: 'success',
                log_url: targetUrl,
                environment_url: targetUrl,
                description: `Backfilled npm release ${packageName}@${version}`
              })

              core.info(`Created deployment for ${version}`)
              created += 1
            }

            core.notice(`Backfill complete. Created: ${created}, skipped: ${skipped}, total npm versions: ${versions.length}`)
