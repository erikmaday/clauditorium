name: Release On Tag

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: Existing tag to release (e.g. v1.4.0)
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Create GitHub Release for tag
        uses: actions/github-script@v7
        env:
          INPUT_TAG: ${{ github.event.inputs.tag }}
        with:
          script: |
            const owner = context.repo.owner
            const repo = context.repo.repo
            const tag = process.env.INPUT_TAG && process.env.INPUT_TAG.length > 0
              ? process.env.INPUT_TAG
              : context.ref.replace('refs/tags/', '')

            try {
              await github.rest.repos.getReleaseByTag({
                owner,
                repo,
                tag
              })
              core.info(`Release already exists for ${tag}; skipping.`)
              return
            } catch (error) {
              if (error.status !== 404) {
                throw error
              }
            }

            await github.rest.repos.createRelease({
              owner,
              repo,
              tag_name: tag,
              target_commitish: 'main',
              name: tag,
              generate_release_notes: true,
              draft: false,
              prerelease: false
            })

            core.info(`Created release for ${tag}`)
