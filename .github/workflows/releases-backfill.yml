name: Releases Backfill

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  backfill:
    runs-on: ubuntu-latest
    steps:
      - name: Create missing GitHub Releases for existing tags
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner
            const repo = context.repo.repo

            const tags = await github.paginate(github.rest.repos.listTags, {
              owner,
              repo,
              per_page: 100
            })

            if (tags.length === 0) {
              core.notice('No tags found. Nothing to backfill.')
              return
            }

            const releases = await github.paginate(github.rest.repos.listReleases, {
              owner,
              repo,
              per_page: 100
            })

            const releasedTags = new Set(releases.map((r) => r.tag_name))
            const versionTags = tags
              .map((t) => t.name)
              .filter((t) => /^v\d+\.\d+\.\d+$/.test(t))
              .sort((a, b) => a.localeCompare(b, undefined, { numeric: true, sensitivity: 'base' }))

            let created = 0
            let skipped = 0

            for (const tag of versionTags) {
              if (releasedTags.has(tag)) {
                core.info(`Skipping existing release for ${tag}`)
                skipped += 1
                continue
              }

              await github.rest.repos.createRelease({
                owner,
                repo,
                tag_name: tag,
                target_commitish: 'main',
                name: tag,
                generate_release_notes: true,
                draft: false,
                prerelease: false
              })

              core.info(`Created release for ${tag}`)
              created += 1
            }

            core.notice(`Backfill complete. Created: ${created}, skipped: ${skipped}, matched tags: ${versionTags.length}`)
