name: Publish to npm

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: Existing tag to publish (e.g. v1.4.1)
        required: true
        type: string

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    name: Publish Package
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Resolve tag
        id: tag
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            echo "value=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.tag.outputs.value }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
          cache: npm

      - name: Validate version matches tag
        run: |
          TAG_VERSION="${{ steps.tag.outputs.value }}"
          TAG_VERSION="${TAG_VERSION#v}"
          PKG_VERSION="$(node -p "require('./package.json').version")"
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "Tag version ($TAG_VERSION) does not match package.json version ($PKG_VERSION)"
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Contract and docs checks
        run: npm run api:contract:check && npm run docs:check

      - name: Test with coverage gate
        run: npm run test:coverage

      - name: Build
        run: npm run build

      - name: Skip publish if version already exists
        id: already_published
        run: |
          NAME="$(node -p "require('./package.json').name")"
          VERSION="$(node -p "require('./package.json').version")"
          if npm view "${NAME}@${VERSION}" version > /dev/null 2>&1; then
            echo "result=true" >> "$GITHUB_OUTPUT"
            echo "Version ${NAME}@${VERSION} already exists on npm."
          else
            echo "result=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to npm
        if: steps.already_published.outputs.result != 'true'
        run: npm publish --provenance --access public

      - name: Create GitHub release for tag
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.value }}
          generate_release_notes: true
