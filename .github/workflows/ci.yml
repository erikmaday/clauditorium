name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: OpenAPI Lint
        run: npm run openapi:lint

      - name: OpenAPI Validate
        run: npm run openapi:validate

      - name: Contract Tests
        run: npm run contract:test

      - name: Test (Coverage Gate)
        run: npm run test:coverage

      - name: Build
        run: npm run build
