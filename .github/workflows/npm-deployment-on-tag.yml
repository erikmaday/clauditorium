name: NPM Deployment On Tag

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: read
  deployments: write

jobs:
  record:
    runs-on: ubuntu-latest
    steps:
      - name: Create deployment record for tagged release
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner
            const repo = context.repo.repo
            const tag = context.ref.replace('refs/tags/', '')
            const version = tag.startsWith('v') ? tag.slice(1) : tag

            const deployment = await github.rest.repos.createDeployment({
              owner,
              repo,
              ref: tag,
              environment: 'npm',
              description: `npm publish clauditorium@${version}`,
              task: `publish:${version}`,
              auto_merge: false,
              required_contexts: [],
              transient_environment: false,
              production_environment: true,
              payload: {
                package: 'clauditorium',
                version
              }
            })

            const targetUrl = `https://www.npmjs.com/package/clauditorium/v/${version}`
            await github.rest.repos.createDeploymentStatus({
              owner,
              repo,
              deployment_id: deployment.data.id,
              state: 'success',
              log_url: targetUrl,
              environment_url: targetUrl,
              description: `Recorded npm release clauditorium@${version}`
            })
